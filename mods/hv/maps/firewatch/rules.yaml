WATERTANK:
	Inherits: ^TrackedVehicle
	Inherits@AUTOTARGET: ^AutoTargetAllAssaultMove
	AutoTargetPriority@DEFAULT:
		ValidTargets: Vehicle, Tree
	Valued:
		Cost: 1000
	Tooltip:
		Name: Fire Fighting Tank
		GenericName: Tank
	Buildable:
		Queue: Vehicle
		Prerequisites: base
		BuildPaletteOrder: 240
		Description: Armored Fire Truck
		BuildAtProductionType: Tracked
	Armament:
		Weapon: WaterCannon
		LocalOffset: 400,-50,0
	AttackFrontal:
		PauseOnCondition: ecmdisabled
		Voice: Attack
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 60000
	Armor:
		Type: Heavy
	Mobile:
		Speed: 71
	RevealsShroud:
		Range: 6c0
	RenderSprites:
		PlayerPalette: green

World:
	LuaScript:
		Scripts: hv|scripts/campaign.lua
	MissionData:
		Briefing: The 1st Colonial Fire Brigade on the forest moon Andor is an need of assistance. The vast natural woodlands face total destruction after heavy fighting of rival mining companies devasted the area. Contain the fire before it's too late.

